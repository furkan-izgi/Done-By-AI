<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Keeper Pro</title>
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --border: #2a2a2a; --text: #ffffff; --dim: #a0a0a0; --accent: #2ecc71; --input-bg: #252525; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); width: 345px; margin: 0; padding: 20px; box-sizing: border-box; overflow: hidden; }
        
        /* OKLARI KESİN YOK EDEN CSS */
        input[type="number"] { -webkit-appearance: textfield !important; -moz-appearance: textfield !important; appearance: textfield !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none !important; margin: 0 !important; display: none !important; }
        
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .header img { width: 28px; height: 28px; filter: drop-shadow(0 0 5px var(--accent)); }
        .header h2 { margin: 0; font-size: 19px; font-weight: 700; flex-grow: 1; color: #fff; }

        .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
        .section-label { display: block; font-size: 10px; font-weight: 800; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

        input, select { background: var(--input-bg); border: 1px solid var(--border); color: #fff; border-radius: 8px; padding: 8px; font-size: 13px; outline: none; text-align: center; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--accent); }

        .limit-row { display: grid; grid-template-columns: 1fr 50px; align-items: center; gap: 10px; }
        .stage-grid { display: flex; flex-direction: column; gap: 10px; }
        .stage-row { display: grid; grid-template-columns: 55px 45px 35px 1fr; gap: 10px; align-items: center; }
        .label-cell { font-size: 10px; font-weight: 800; text-align: center; display: flex; justify-content: center; align-items: center; height: 32px; }

        .clr-box { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .clr-box input { position: absolute; top: -10px; left: -10px; width: 60px; height: 60px; cursor: pointer; border: none; }

        .btn { width: 100%; background: #fff; color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .btn:hover { background: #eee; }
        .status { text-align: center; font-size: 12px; margin-top: 12px; color: var(--accent); font-weight: 600; display: none; }
    </style>
</head>
<body>
    <div class="header"><img src="icon.svg" alt="Logo"><h2>Time Keeper</h2></div>
    <div class="section">
        <label class="section-label">Daily Limit</label>
        <div class="limit-row">
            <input type="number" id="dailyLimit" value="120" style="font-weight: 700; font-size: 16px;">
            <span style="font-size: 11px; color: var(--dim); font-weight: 700;">MINS</span>
        </div>
    </div>
    <div class="section">
        <label class="section-label">Alert Progression</label>
        <div class="stage-grid">
            <div class="stage-row">
                <div class="label-cell" style="color: var(--dim);">START</div>
                <input type="text" id="s0_icon" value="🟢">
                <div class="clr-box"><input type="color" id="s0_color" value="#2ecc71"></div>
                <select id="s0_sound"><option value="none">Mute</option><option value="chime">Chime</option><option value="warning">Alert</option><option value="siren">Siren</option></select>
            </div>
            <div class="stage-row">
                <input type="number" id="s1_time" value="15">
                <input type="text" id="s1_icon" value="🟡">
                <div class="clr-box"><input type="color" id="s1_color" value="#f1c40f"></div>
                <select id="s1_sound"><option value="none">Mute</option><option value="chime">Chime</option><option value="warning">Alert</option><option value="siren">Siren</option></select>
            </div>
            <div class="stage-row">
                <input type="number" id="s2_time" value="30">
                <input type="text" id="s2_icon" value="🟠">
                <div class="clr-box"><input type="color" id="s2_color" value="#e67e22"></div>
                <select id="s2_sound"><option value="none">Mute</option><option value="chime">Chime</option><option value="warning">Alert</option><option value="siren">Siren</option></select>
            </div>
            <div class="stage-row">
                <div class="label-cell" style="color: var(--accent);">LIMIT</div>
                <input type="text" id="s3_icon" value="🔴">
                <div class="clr-box"><input type="color" id="s3_color" value="#e74c3c"></div>
                <select id="s3_sound"><option value="none">Mute</option><option value="chime">Chime</option><option value="warning">Alert</option><option value="siren">Siren</option>></select>
            </div>
        </div>
    </div>
    <button class="btn" id="saveBtn">Save Changes</button>
    <div class="status" id="statusMsg">Synced ✨</div>
    <script src="popup.js"></script>
</body>
</html>
